<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="전 세계 서버까지의 네트워크 경로를 3D 지구본에서 시각화해보세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://sosig.shop/static/logo/sosig_logo_280.png">
    <meta property="og:title" content="네트워크 경로 추적 - AI 뉴스 플랫폼">
    <meta property="og:description" content="전 세계 서버까지의 네트워크 경로를 3D 지구본에서 시각화해보세요.">
    <meta property="og:url" content="https://sosig.shop/route">
    <meta property="og:site_name" content="AI 뉴스 플랫폼">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="https://sosig.shop/static/logo/sosig_logo_280.png">
    <meta name="twitter:title" content="네트워크 경로 추적 - AI 뉴스 플랫폼">
    <meta name="twitter:description" content="전 세계 서버까지의 네트워크 경로를 3D 지구본에서 시각화해보세요.">
    <title>Network Route Tracer - sosig.shop</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <link rel="icon" type="image/png" sizes="32x32" href="/static/logo/sosig_logo_32.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/static/logo/sosig_logo_64.png">
    <link rel="apple-touch-icon" sizes="140x140" href="/static/logo/sosig_logo_140.png">
    <link rel="stylesheet" href="{{ static_v('css/route.css') }}">
</head>

<body>
    <div id="countryTooltip"></div>
    <div id="globe-container"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="back-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>Back to Home</a>
            <h1>🌐 Network Route Tracer</h1>
            <p class="subtitle">목적지까지의 네트워크 경로를 3D로 시각화</p>
        </div>
        <div class="input-section">
            <div class="input-group">
                <label>대상 호스트</label>
                <div class="target-list" id="targetList">
                    <div class="target-row">
                        <input type="color" value="#ef4444">
                        <input type="text" id="target" value="univie.ac.at" placeholder="ex) univie.ac.at">
                    </div>
                </div>
                <button class="add-btn" id="addBtn">+ 대상 추가</button>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <div class="input-group" style="flex:1;">
                    <label>최대 홉</label>
                    <input type="number" id="maxHops" value="20" min="1" max="30">
                </div>
                <div class="input-group" style="flex:1;">
                    <label>프로브 수</label>
                    <input type="number" id="probes" value="2" min="1" max="5">
                </div>
            </div>
            <button class="trace-btn" id="traceBtn" onclick="startTrace()">🔍 경로 추적 시작</button>
        </div>
        <div class="options-section">
            <div class="options-title">🌍 지구본 옵션</div>
            <div class="option-row">
                <span class="option-label">☁️ 구름 표시</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="cloudsToggle" onchange="toggleClouds()" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="option-row">
                <span class="option-label">☀️ 실시간 태양 위치</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="sunToggle" onchange="toggleSunPosition()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="option-row">
                <span class="option-label">✨ 패킷 애니메이션</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="animationToggle" onchange="toggleAnimation()" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        <div class="rtt-graph-section" id="rttGraphSection" style="display: none;">
            <div class="rtt-graph-header">
                <span class="rtt-graph-title">📈 RTT 지연 그래프</span>
                <div class="rtt-stats" id="rttStats"></div>
            </div>
            <div class="rtt-graph-container">
                <canvas id="rttChart"></canvas>
            </div>
            <div class="rtt-legend" id="rttLegend"></div>
        </div>
        <div class="export-section" id="exportSection">
            <div class="export-btns">
                <button class="export-btn" onclick="exportJSON()">📄 JSON 내보내기</button>
                <button class="export-btn" onclick="exportCSV()">📊 CSV 내보내기</button>
            </div>
        </div>
        <div class="results-section" id="results">
            <div class="loading-msg">대상 호스트를 입력하고 추적을 시작하세요</div>
        </div>
    </div>

    
    <script src="{{ static_v('js/route.js') }}"></script>
</body>

</html>
