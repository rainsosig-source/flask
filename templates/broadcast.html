<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="전체 에피소드를 검색하고 토픽별로 필터링하며 바로 재생해보세요.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="방영록 - AI 뉴스 플랫폼">
    <meta property="og:description" content="전체 에피소드를 검색하고 토픽별로 필터링하며 바로 재생해보세요.">
    <meta property="og:url" content="https://sosig.shop/broadcast">
    <meta property="og:site_name" content="AI 뉴스 플랫폼">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="방영록 - AI 뉴스 플랫폼">
    <meta name="twitter:description" content="전체 에피소드를 검색하고 토픽별로 필터링하며 바로 재생해보세요.">
    <title>방영록 - AI 뉴스 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/broadcast.css">
</head>

<body>
    <header>
        <a href="/" class="home-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Home
        </a>
        <h1>Broadcast Log</h1>
        <button class="theme-toggle-sm" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Filters -->
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterTopic(null, this)">All</button>
        <div id="topicFilters"></div>
        <input type="text" class="search-input" id="searchInput" placeholder="Search title or press..." oninput="debounceSearch()">
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="td-play"></th>
                    <th>Title</th>
                    <th>Topic</th>
                    <th>Press</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" style="display:none;" class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>No episodes found.</p>
        </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <!-- Mini Player -->
    <div class="mini-player" id="miniPlayer">
        <button class="mini-play-btn" id="miniPlayBtn" onclick="togglePlay()">▶</button>
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">-</div>
            <div class="mini-meta" id="miniMeta">-</div>
        </div>
        <div class="mini-progress" id="miniProgressBar">
            <div class="mini-progress-fill" id="miniProgressFill"></div>
        </div>
        <span class="mini-time" id="miniTime">0:00 / 0:00</span>
        <button class="mini-speed" id="miniSpeedBtn" onclick="cycleSpeed()">1x</button>
        <audio id="audioPlayer"></audio>
    </div>

    <script src="/static/js/broadcast.js"></script>
</body>

</html>
