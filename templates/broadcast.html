<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI 뉴스 플랫폼 방명록 - 방문 소감을 남겨주세요.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://sosig.shop/static/logo/sosig_logo_280.png">
    <meta property="og:title" content="방명록 - AI 뉴스 플랫폼">
    <meta property="og:description" content="방문 소감을 남겨주세요.">
    <meta property="og:url" content="https://sosig.shop/broadcast">
    <meta property="og:site_name" content="AI 뉴스 플랫폼">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="https://sosig.shop/static/logo/sosig_logo_280.png">
    <meta name="twitter:title" content="방명록 - AI 뉴스 플랫폼">
    <meta name="twitter:description" content="방문 소감을 남겨주세요.">
    <title>방명록 - AI 뉴스 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ static_v('css/broadcast.css') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/logo/sosig_logo_32.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/static/logo/sosig_logo_64.png">
    <link rel="apple-touch-icon" sizes="140x140" href="/static/logo/sosig_logo_140.png">
</head>

<body>
    <header>
        <a href="/" class="home-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Home
        </a>
        <h1>Guestbook</h1>
        <button class="theme-toggle-sm" onclick="toggleTheme()" id="themeBtn">&#127769;</button>
    </header>

    <!-- Write Form -->
    <div class="write-card">
        <h2>메시지 남기기</h2>
        <div class="form-row">
            <input type="text" id="nickname" placeholder="닉네임 (최대 50자)" maxlength="50">
        </div>
        <div class="form-row">
            <textarea id="message" placeholder="메시지를 입력해주세요 (최대 500자)" maxlength="500" rows="3"></textarea>
            <div class="char-count"><span id="charCount">0</span>/500</div>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitMessage()">등록</button>
    </div>

    <!-- Messages -->
    <div class="messages-section">
        <div class="messages-header">
            <span id="totalCount">0</span>개의 메시지
        </div>
        <div id="messageList"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script src="{{ static_v('js/broadcast.js') }}"></script>
</body>

</html>
