<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방영록 - AI 뉴스 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color-light: #f8f9fa;
            --card-bg-light: rgba(255, 255, 255, 0.9);
            --card-border-light: rgba(0, 0, 0, 0.1);
            --text-main-light: #212529;
            --text-muted-light: #6c757d;

            --bg-color-dark: #050505;
            --card-bg-dark: rgba(255, 255, 255, 0.03);
            --card-border-dark: rgba(255, 255, 255, 0.1);
            --text-main-dark: #ffffff;
            --text-muted-dark: #888888;

            --accent-cyan: #4cc9f0;
            --accent-amber: #ff9e00;

            --bg-color: var(--bg-color-dark);
            --card-bg: var(--card-bg-dark);
            --card-border: var(--card-border-dark);
            --text-main: var(--text-main-dark);
            --text-muted: var(--text-muted-dark);
        }

        html.light-mode {
            --bg-color: var(--bg-color-light);
            --card-bg: var(--card-bg-light);
            --card-border: var(--card-border-light);
            --text-main: var(--text-main-light);
            --text-muted: var(--text-muted-light);
        }

        * { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        html.light-mode header {
            background: rgba(248, 249, 250, 0.8);
        }

        .home-link {
            text-decoration: none;
            color: var(--accent-cyan);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .home-link:hover { color: #fff; text-shadow: 0 0 10px var(--accent-cyan); }
        html.light-mode .home-link:hover { color: #000; }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .theme-toggle-sm {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-main);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .theme-toggle-sm:hover { border-color: var(--accent-cyan); }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 20px 40px;
            overflow-x: auto;
            border-bottom: 1px solid var(--card-border);
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px 24px;
            min-width: 140px;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 20px 40px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 8px 18px;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

        .filter-btn.active {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            color: #000;
            font-weight: 600;
        }

        .search-input {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 8px 18px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            outline: none;
            width: 200px;
            transition: all 0.3s;
            margin-left: auto;
        }

        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent-cyan); width: 280px; }

        /* Episode Table */
        .table-container {
            padding: 0 40px 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 14px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 70px;
            background: var(--bg-color);
            z-index: 10;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s;
            cursor: pointer;
        }

        html.light-mode tbody tr { border-bottom: 1px solid rgba(0,0,0,0.05); }

        tbody tr:hover { background: rgba(76, 201, 240, 0.05); }

        tbody td {
            padding: 14px 16px;
            font-size: 0.9rem;
            vertical-align: middle;
        }

        .td-date {
            color: var(--text-muted);
            font-size: 0.8rem;
            white-space: nowrap;
            width: 150px;
        }

        .td-topic {
            width: 120px;
        }

        .topic-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(76, 201, 240, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(76, 201, 240, 0.2);
        }

        .topic-badge.economy {
            background: rgba(255, 158, 0, 0.1);
            color: var(--accent-amber);
            border-color: rgba(255, 158, 0, 0.2);
        }

        .td-title {
            font-weight: 400;
        }

        .td-title a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
        }

        .td-title a:hover { color: var(--accent-cyan); }

        .td-press {
            color: var(--text-muted);
            font-size: 0.8rem;
            width: 100px;
        }

        .td-play {
            width: 40px;
            text-align: center;
        }

        .play-btn {
            background: none;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-left: 2px;
        }

        .play-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(76, 201, 240, 0.3);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 30px 40px;
        }

        .page-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .page-btn.active { background: var(--accent-cyan); border-color: var(--accent-cyan); color: #000; font-weight: 600; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Mini Player */
        .mini-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.95);
            border-top: 1px solid var(--card-border);
            padding: 12px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(20px);
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        html.light-mode .mini-player { background: rgba(248, 249, 250, 0.95); }

        .mini-player.active { transform: translateY(0); }

        .mini-play-btn {
            width: 40px;
            height: 40px;
            background: var(--accent-cyan);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 1rem;
            cursor: pointer;
            flex-shrink: 0;
            padding-left: 3px;
            transition: transform 0.2s;
        }

        .mini-play-btn:hover { transform: scale(1.1); }

        .mini-info { flex: 1; min-width: 0; }
        .mini-title { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-meta { font-size: 0.75rem; color: var(--text-muted); }

        .mini-progress {
            flex: 2;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            overflow: hidden;
        }

        html.light-mode .mini-progress { background: rgba(0,0,0,0.1); }

        .mini-progress-fill {
            height: 100%;
            background: var(--accent-amber);
            width: 0%;
            border-radius: 2px;
        }

        .mini-time { font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0; }

        .mini-speed {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .mini-speed:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .mini-speed.active { background: var(--accent-cyan); border-color: var(--accent-cyan); color: #000; }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon { font-size: 3rem; margin-bottom: 10px; opacity: 0.3; }

        /* Mobile */
        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .stats-bar { padding: 15px 20px; gap: 10px; }
            .stat-card { padding: 12px 16px; min-width: 110px; }
            .stat-value { font-size: 1.2rem; }
            .filter-bar { padding: 15px 20px; }
            .search-input { width: 100%; margin-left: 0; }
            .search-input:focus { width: 100%; }
            .table-container { padding: 0 10px 20px; }
            thead th { padding: 10px 8px; font-size: 0.7rem; }
            tbody td { padding: 10px 8px; font-size: 0.8rem; }
            .td-press { display: none; }
            .td-date { width: 80px; font-size: 0.7rem; }
            .mini-player { padding: 10px 20px; flex-wrap: wrap; gap: 10px; }
            .mini-progress { flex-basis: 100%; order: 10; }
            .pagination { padding: 20px; }
        }
    </style>
</head>

<body>
    <header>
        <a href="/" class="home-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Home
        </a>
        <h1>Broadcast Log</h1>
        <button class="theme-toggle-sm" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Filters -->
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterTopic(null, this)">All</button>
        <div id="topicFilters"></div>
        <input type="text" class="search-input" id="searchInput" placeholder="Search title or press..." oninput="debounceSearch()">
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="td-play"></th>
                    <th>Title</th>
                    <th>Topic</th>
                    <th>Press</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" style="display:none;" class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>No episodes found.</p>
        </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <!-- Mini Player -->
    <div class="mini-player" id="miniPlayer">
        <button class="mini-play-btn" id="miniPlayBtn" onclick="togglePlay()">▶</button>
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">-</div>
            <div class="mini-meta" id="miniMeta">-</div>
        </div>
        <div class="mini-progress" id="miniProgressBar">
            <div class="mini-progress-fill" id="miniProgressFill"></div>
        </div>
        <span class="mini-time" id="miniTime">0:00 / 0:00</span>
        <button class="mini-speed" id="miniSpeedBtn" onclick="cycleSpeed()">1x</button>
        <audio id="audioPlayer"></audio>
    </div>

    <script>
        const PER_PAGE = 50;
        let currentPage = 1;
        let currentTopic = null;
        let searchQuery = '';
        let searchTimer = null;
        let allKeywords = [];

        const audio = document.getElementById('audioPlayer');
        const miniPlayer = document.getElementById('miniPlayer');
        const speeds = [1, 1.25, 1.5, 1.75, 2];
        let speedIndex = 0;

        async function init() {
            const theme = localStorage.getItem('theme');
            if (theme === 'light') {
                document.documentElement.classList.add('light-mode');
                document.getElementById('themeBtn').textContent = '☀️';
            }
            await fetchKeywords();
            await fetchEpisodes();
        }

        async function fetchKeywords() {
            try {
                const res = await fetch('/api/keywords');
                allKeywords = await res.json();
                renderTopicFilters();
                renderStats();
            } catch (e) { console.error(e); }
        }

        function renderTopicFilters() {
            const container = document.getElementById('topicFilters');
            container.innerHTML = '';
            allKeywords.forEach(k => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = k.topic || k.keyword;
                btn.onclick = () => filterTopic(k.id, btn);
                container.appendChild(btn);
            });
        }

        async function renderStats() {
            try {
                const res = await fetch('/api/broadcast/stats');
                const stats = await res.json();
                const bar = document.getElementById('statsBar');
                bar.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Total Episodes</div>
                        <div class="stat-value">${stats.total.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Today</div>
                        <div class="stat-value">${stats.today}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Topics</div>
                        <div class="stat-value">${stats.topics}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Sources</div>
                        <div class="stat-value">${stats.sources}</div>
                    </div>
                `;
            } catch (e) { console.error(e); }
        }

        async function fetchEpisodes() {
            let url = `/api/broadcast?page=${currentPage}&per_page=${PER_PAGE}`;
            if (currentTopic) url += `&keyword_id=${currentTopic}`;
            if (searchQuery) url += `&q=${encodeURIComponent(searchQuery)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                renderTable(data.episodes);
                renderPagination(data.total, data.page, data.per_page);
            } catch (e) { console.error(e); }
        }

        function renderTable(episodes) {
            const tbody = document.getElementById('tableBody');
            const empty = document.getElementById('emptyState');

            if (!episodes || episodes.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            tbody.innerHTML = episodes.map(ep => {
                const isEconomy = (ep.topic || '').startsWith('경제');
                const badgeClass = isEconomy ? 'topic-badge economy' : 'topic-badge';
                const date = ep.created_at.replace(' ', '<br>');
                return `
                <tr onclick="playEpisode(this, '${ep.static_path}', '${ep.title.replace(/'/g, "\\'")}', '${ep.press}')">
                    <td class="td-play"><button class="play-btn" onclick="event.stopPropagation();">▶</button></td>
                    <td class="td-title"><a href="${ep.link}" target="_blank" onclick="event.stopPropagation();">${ep.title}</a></td>
                    <td class="td-topic"><span class="${badgeClass}">${ep.topic || '-'}</span></td>
                    <td class="td-press">${ep.press}</td>
                    <td class="td-date">${ep.created_at}</td>
                </tr>`;
            }).join('');
        }

        function renderPagination(total, page, perPage) {
            const totalPages = Math.ceil(total / perPage);
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }

            let html = `<button class="page-btn" onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>&lsaquo;</button>`;

            let start = Math.max(1, page - 3);
            let end = Math.min(totalPages, page + 3);

            if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button><span style="color:var(--text-muted);padding:0 5px;">...</span>`;

            for (let i = start; i <= end; i++) {
                html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            }

            if (end < totalPages) html += `<span style="color:var(--text-muted);padding:0 5px;">...</span><button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;

            html += `<button class="page-btn" onclick="goPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>&rsaquo;</button>`;
            container.innerHTML = html;
        }

        function goPage(p) {
            currentPage = p;
            fetchEpisodes();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterTopic(id, btn) {
            currentTopic = id;
            currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchEpisodes();
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                searchQuery = document.getElementById('searchInput').value.trim();
                currentPage = 1;
                fetchEpisodes();
            }, 400);
        }

        // Player
        function playEpisode(row, path, title, press) {
            document.querySelectorAll('tbody tr').forEach(r => r.style.background = '');
            row.style.background = 'rgba(76, 201, 240, 0.08)';

            const src = '/static/' + (path.startsWith('/') ? path.substring(1) : path);
            audio.src = src;
            audio.playbackRate = speeds[speedIndex];
            audio.play();

            document.getElementById('miniTitle').innerText = title;
            document.getElementById('miniMeta').innerText = press;
            document.getElementById('miniPlayBtn').innerText = '⏸';
            miniPlayer.classList.add('active');
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('miniPlayBtn').innerText = '⏸'; }
            else { audio.pause(); document.getElementById('miniPlayBtn').innerText = '▶'; }
        }

        function cycleSpeed() {
            speedIndex = (speedIndex + 1) % speeds.length;
            audio.playbackRate = speeds[speedIndex];
            const btn = document.getElementById('miniSpeedBtn');
            btn.innerText = speeds[speedIndex] + 'x';
            btn.classList.toggle('active', speedIndex !== 0);
        }

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('miniProgressFill').style.width = pct + '%';
            const fmt = s => { if (isNaN(s)) return '0:00'; const m = Math.floor(s/60); return m + ':' + String(Math.floor(s%60)).padStart(2,'0'); };
            document.getElementById('miniTime').innerText = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
        });

        audio.addEventListener('ended', () => {
            document.getElementById('miniPlayBtn').innerText = '▶';
        });

        document.getElementById('miniProgressBar').addEventListener('click', e => {
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });

        function toggleTheme() {
            document.documentElement.classList.toggle('light-mode');
            const isLight = document.documentElement.classList.contains('light-mode');
            document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        init();
    </script>
</body>

</html>
