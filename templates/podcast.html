<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="날짜별, 주제별로 정리된 일일 AI 뉴스 브리핑 팟캐스트를 들어보세요.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="팟캐스트 캘린더 - AI 뉴스 플랫폼">
    <meta property="og:description" content="날짜별, 주제별로 정리된 일일 AI 뉴스 브리핑 팟캐스트를 들어보세요.">
    <meta property="og:url" content="https://sosig.shop/podcast">
    <meta property="og:site_name" content="AI 뉴스 플랫폼">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="팟캐스트 캘린더 - AI 뉴스 플랫폼">
    <meta name="twitter:description" content="날짜별, 주제별로 정리된 일일 AI 뉴스 브리핑 팟캐스트를 들어보세요.">
    <title>Podcast Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/podcast.css">
</head>

<body>
    <header>
        <a href="/" class="home-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Home
        </a>
        <h1>Daily Briefing</h1>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"><span class="theme-icon" id="themeIcon">&#x1F319;</span><span id="themeText">Dark</span></button>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Keyword Filter -->
            <div class="glass-panel filter-group">
                <h3>Topic</h3>
                <div class="tags-container" id="keywordTags">
                    <div class="tag active" onclick="filterKeyword(null, this)">All</div>
                </div>
            </div>

            <!-- Calendar (Moved Up) -->
            <div class="glass-panel">
                <div class="calendar-header">
                    <button class="nav-btn" id="prevMonth">‹</button>
                    <h2 id="currentMonth">Month Year</h2>
                    <button class="nav-btn" id="nextMonth">›</button>
                </div>
                <div class="calendar-grid-header">
                    <div class="day-name">S</div>
                    <div class="day-name">M</div>
                    <div class="day-name">T</div>
                    <div class="day-name">W</div>
                    <div class="day-name">T</div>
                    <div class="day-name">F</div>
                    <div class="day-name">S</div>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <!-- Time Filter (Moved Down & Updated Logic) -->
            <div class="glass-panel filter-group" id="timeFilterPanel" style="display:none;">
                <h3>Time</h3>
                <div class="tags-container" id="timeTags">
                    <div class="tag active" onclick="filterTime(null, this)">All</div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="list-header" id="listHeader">Recent Episodes</div>
            <div id="episodeList" class="episode-list">
                <!-- Episodes injected by JS -->
            </div>
        </main>
    </div>

    <!-- Player Bar -->
    <div class="player-bar" id="playerBar">
        <div class="player-controls">
            <button class="btn-control" onclick="skip(-10)" title="-10s">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 17l-5-5 5-5M18 17l-5-5 5-5" />
                </svg>
            </button>
            <button class="btn-control btn-play" id="mainPlayBtn" onclick="togglePlay()">▶</button>
            <button class="btn-control" onclick="skip(10)" title="+10s">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 17l5-5-5-5M6 17l5-5-5-5" />
                </svg>
            </button>
        </div>

        <div class="track-info">
            <div class="track-title" id="playerTitle">Select an episode</div>
            <div class="track-meta" id="playerMeta">--</div>
        </div>

        <button class="speed-btn" id="speedBtn" onclick="cycleSpeed()" title="재생 속도">1x</button>

        <div class="visualizer paused" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <div class="progress-bar-wrapper" id="progressBarWrapper">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="duration">0:00</span>
        </div>

        <audio id="audioPlayer" style="display:none;"></audio>
    </div>

    <script src="/static/js/podcast.js?v=3"></script>
</body>

</html>
